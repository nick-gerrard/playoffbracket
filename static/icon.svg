<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#052E16"/>
    </linearGradient>
    <linearGradient id="head" x1="25" y1="25" x2="460" y2="485" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6D28D9"/>
      <stop offset="45%"  stop-color="#166534"/>
      <stop offset="100%" stop-color="#052E16"/>
    </linearGradient>
    <linearGradient id="bill" x1="360" y1="195" x2="507" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D4CF52"/>
      <stop offset="100%" stop-color="#7C9420"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <!-- Head -->
    <circle cx="220" cy="256" r="179" fill="url(#head)"/>

    <!-- Iridescent sheen -->
    <ellipse cx="172" cy="183" rx="82" ry="46"
             fill="#2DD4BF" fill-opacity="0.16"
             transform="rotate(-20 172 183)"/>

    <!-- Specular highlight -->
    <ellipse cx="136" cy="162" rx="56" ry="33"
             fill="white" fill-opacity="0.08"
             transform="rotate(-30 136 162)"/>

    <!-- Upper mandible -->
    <path d="M 363 210
             L 456 194
             Q 507 194 507 245
             Q 507 292 456 292
             L 363 271
             Z"
          fill="url(#bill)"/>

    <!-- Lower mandible -->
    <path d="M 363 277
             L 446 298
             Q 487 313 477 344
             L 363 318
             Z"
          fill="url(#bill)" fill-opacity="0.82"/>

    <!-- Dividing line -->
    <line x1="363" y1="274" x2="504" y2="274"
          stroke="#3D5010" stroke-width="8" stroke-linecap="round" opacity="0.55"/>

    <!-- Nostril -->
    <ellipse cx="426" cy="230" rx="20" ry="13"
             fill="#3D5010" fill-opacity="0.3"/>

    <!-- Eye -->
    <circle cx="272" cy="208" r="33" fill="#0A0A1A" fill-opacity="0.88"/>
    <circle cx="281" cy="197" r="11" fill="white" fill-opacity="0.78"/>
  </g>
</svg>

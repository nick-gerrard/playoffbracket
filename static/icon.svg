<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="shield" x1="256" y1="84" x2="256" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="trophy" x1="256" y1="180" x2="256" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g clip-path="url(#clip)" fill="none">
    <!-- Hockey sticks -->
    <line x1="116" y1="40"  x2="344" y2="456" stroke="#475569" stroke-width="26" stroke-linecap="round"/>
    <line x1="344" y1="456" x2="408" y2="436" stroke="#475569" stroke-width="26" stroke-linecap="round"/>
    <line x1="396" y1="40"  x2="168" y2="456" stroke="#475569" stroke-width="26" stroke-linecap="round"/>
    <line x1="168" y1="456" x2="104" y2="436" stroke="#475569" stroke-width="26" stroke-linecap="round"/>

    <!-- Shield body -->
    <path d="M112 84 L400 84 L400 300 Q400 404 256 464 Q112 404 112 300 Z" fill="url(#shield)"/>
    <!-- Shield border -->
    <path d="M112 84 L400 84 L400 300 Q400 404 256 464 Q112 404 112 300 Z" stroke="#60a5fa" stroke-width="10"/>
    <!-- Shield inner highlight -->
    <path d="M144 112 L368 112 L368 284 Q368 372 256 420 Q144 372 144 284 Z" fill="white" fill-opacity="0.04"/>

    <!-- Trophy cup -->
    <path d="M192 180 L320 180 L300 260 L212 260 Z" fill="url(#trophy)"/>
    <!-- Handles -->
    <path d="M196 200 Q144 232 196 264" stroke="#fbbf24" stroke-width="14" stroke-linecap="round"/>
    <path d="M316 200 Q368 232 316 264" stroke="#fbbf24" stroke-width="14" stroke-linecap="round"/>
    <!-- Stem -->
    <rect x="240" y="260" width="32" height="36" rx="4" fill="#d97706"/>
    <!-- Base -->
    <rect x="204" y="296" width="104" height="20" rx="6" fill="url(#trophy)"/>
    <!-- Shine -->
    <line x1="220" y1="196" x2="232" y2="248" stroke="white" stroke-opacity="0.4" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>

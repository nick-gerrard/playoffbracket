<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 112" fill="none">
  <defs>
    <linearGradient id="shield" x1="50" y1="13" x2="50" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="trophy" x1="50" y1="37" x2="50" y2="71" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- Hockey sticks (drawn behind shield) -->
  <line x1="15" y1="2"  x2="72" y2="106" stroke="#64748b" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="72" y1="106" x2="88" y2="101" stroke="#64748b" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="85" y1="2"  x2="28" y2="106" stroke="#64748b" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="28" y1="106" x2="12" y2="101" stroke="#64748b" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Shield body -->
  <path d="M14 13 L86 13 L86 67 Q86 93 50 108 Q14 93 14 67 Z" fill="url(#shield)"/>
  <!-- Shield border -->
  <path d="M14 13 L86 13 L86 67 Q86 93 50 108 Q14 93 14 67 Z" stroke="#60a5fa" stroke-width="2.5"/>
  <!-- Shield inner highlight -->
  <path d="M22 20 L78 20 L78 62 Q78 82 50 95 Q22 82 22 62 Z" fill="white" fill-opacity="0.04"/>

  <!-- Trophy cup -->
  <path d="M34 37 L66 37 L61 57 L39 57 Z" fill="url(#trophy)"/>
  <!-- Handles -->
  <path d="M35 42 Q23 50 35 58" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M65 42 Q77 50 65 58" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Stem -->
  <rect x="46" y="57" width="8" height="9" rx="1" fill="#d97706"/>
  <!-- Base -->
  <rect x="37" y="66" width="26" height="5" rx="1.5" fill="url(#trophy)"/>
  <!-- Shine -->
  <line x1="41" y1="41" x2="44" y2="54" stroke="white" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round"/>
</svg>

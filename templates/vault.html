{% extends "base.html" %}
{% block title %}The Vault{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">

    <h1 class="text-2xl sm:text-3xl font-bold mb-8">The Vault</h1>

    <div class="flex flex-col gap-3">
        {% for u in users %}
        <div class="flex items-center gap-4 bg-white/5 backdrop-blur-sm border rounded-xl px-5 py-4
            {% if u.id == user.id %}border-yellow-400/40 bg-yellow-400/5{% else %}border-white/10{% endif %}">

            <span class="text-2xl font-black w-8 text-center
                {% if loop.index == 1 %}text-yellow-400
                {% elif loop.index == 2 %}text-gray-300
                {% elif loop.index == 3 %}text-amber-600
                {% else %}text-gray-500{% endif %}">
                {{ loop.index }}
            </span>

            <span class="flex-1 font-semibold">
                {{ u.name }}
                {% if u.id == user.id %}<span class="text-xs text-yellow-400 ml-1">(you)</span>{% endif %}
            </span>

            <div class="flex items-center gap-1.5 text-yellow-400 font-bold text-lg">
                <svg class="size-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z" />
                </svg>
                {{ u.balance }}
            </div>

        </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
